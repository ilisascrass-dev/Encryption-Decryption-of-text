<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cat encryption</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    background:#050816;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
}

/* Background */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#8b5cf6;
    filter:blur(180px);
    opacity:.25;
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    background:#06b6d4;
    filter:blur(180px);
    opacity:.2;
    bottom:-150px;
    right:-150px;
}

/* FIXED LINES */
.lines{
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:0;
    pointer-events:none;
}

/* Card */
.container{
    width:100%;
    max-width:480px;
    position:relative;
    z-index:2;

    background:rgba(12,18,35,0.65);
    backdrop-filter:blur(25px);

    border-radius:35px;

    padding:28px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 40px rgba(0,0,0,.5),
    0 0 25px rgba(139,92,246,.18);

    overflow:hidden;
}

/* Neon Border */
.container::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:35px;
    padding:1.5px;

    background:
    linear-gradient(
    135deg,
    rgba(168,85,247,.9),
    rgba(34,211,238,.9)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;
            mask-composite:exclude;

    pointer-events:none;
}

/* Title */
.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:42px;
    font-weight:700;

    background:linear-gradient(
    90deg,
    #8b5cf6,
    #22d3ee
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title p{
    color:#d1d5db;
    margin-top:8px;
    font-size:15px;
    line-height:1.5;
}

/* Textarea */
textarea{
    width:100%;
    min-height:170px;

    resize:none;
    outline:none;

    border-radius:24px;

    padding:20px;

    margin-top:18px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.07);

    color:white;

    font-size:16px;

    transition:.25s;
}

textarea:focus{
    border:1px solid #8b5cf6;

    box-shadow:
    0 0 20px rgba(139,92,246,.25);
}

textarea::placeholder{
    color:#9ca3af;
}

/* Select */
select{
    width:100%;

    margin-top:18px;

    padding:18px;

    border:none;
    outline:none;

    border-radius:22px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    font-size:16px;
}

option{
    background:#111827;
}

/* Buttons */
.buttons{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:22px;
}

button{
    border:none;
    cursor:pointer;

    padding:18px;

    border-radius:22px;

    font-size:18px;
    font-weight:600;

    color:white;

    transition:.25s;
}

/* Encode */
.encode{
    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #22d3ee
    );

    box-shadow:
    0 0 25px rgba(124,58,237,.4);
}

/* Decode */
.decode{
    background:
    linear-gradient(
    90deg,
    #0f172a,
    #1e293b
    );

    border:1px solid rgba(255,255,255,0.06);
}

button:hover{
    transform:translateY(-3px) scale(1.01);
}

/* Footer */
.footer{
    margin-top:25px;

    text-align:center;

    color:#9ca3af;

    font-size:14px;
}

/* Mobile */
@media(max-width:500px){

    .container{
        padding:22px;
        border-radius:28px;
    }

    .title h1{
        font-size:34px;
    }

    textarea{
        min-height:150px;
    }

}

</style>
</head>

<body>

<div class="lines"></div>

<div class="container">

    <div class="title">
        <h1>⚡ cat encryption</h1>
        <p>
            Base64 • HEX • Binary • URL Encode • Reverse
        </p>
    </div>

    <textarea
    id="input"
    placeholder="Enter the text..."
    ></textarea>

    <select id="method">

        <option value="base64">
            🔐 Base64
        </option>

        <option value="url">
            🌐 URL Encode
        </option>

        <option value="binary">
            💻 Binary
        </option>

        <option value="hex">
            🧩 HEX
        </option>

        <option value="reverse">
            🔄 Reverse
        </option>

    </select>

    <div class="buttons">

        <button
        class="encode"
        onclick="encodeText()">
           Encrypt it
        </button>

        <button
        class="decode"
        onclick="decodeText()">
            Decrypt
        </button>

    </div>

    <textarea
    id="output"
    placeholder="Result..."
    ></textarea>

    <div class="footer">
        The site was designed to encrypt and decrypt text.
    </div>

</div>

<script>

function encodeText(){

    let text =
    document.getElementById("input").value;

    let method =
    document.getElementById("method").value;

    let result = "";

    try{

        switch(method){

            case "base64":

                result =
                btoa(
                unescape(
                encodeURIComponent(text)
                ));

            break;

            case "url":

                result =
                encodeURIComponent(text);

            break;

            case "binary":

                result =
                text.split("")
                .map(c =>
                c.charCodeAt(0).toString(2))
                .join(" ");

            break;

            case "hex":

                result =
                text.split("")
                .map(c =>
                c.charCodeAt(0).toString(16))
                .join(" ");

            break;

            case "reverse":

                result =
                text.split("")
                .reverse()
                .join("");

            break;
        }

        document.getElementById("output")
        .value = result;

    }catch(e){

        alert("Ошибка шифрования");

    }

}

function decodeText(){

    let text =
    document.getElementById("input").value;

    let method =
    document.getElementById("method").value;

    let result = "";

    try{

        switch(method){

            case "base64":

                result =
                decodeURIComponent(
                escape(
                atob(text)
                ));

            break;

            case "url":

                result =
                decodeURIComponent(text);

            break;

            case "binary":

                result =
                text.split(" ")
                .map(b =>
                String.fromCharCode(
                parseInt(b,2)
                ))
                .join("");

            break;

            case "hex":

                result =
                text.split(" ")
                .map(h =>
                String.fromCharCode(
                parseInt(h,16)
                ))
                .join("");

            break;

            case "reverse":

                result =
                text.split("")
                .reverse()
                .join("");

            break;
        }

        document.getElementById("output")
        .value = result;

    }catch(e){

        alert("Ошибка расшифровки");

    }

}

</script>

</body>
  </html>
