<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 1100px;
            width: 100%;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #8b5cf6, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: rgba(255, 255, 255, 0.5); margin-bottom: 25px; }
        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .header-actions button, .header-actions a {
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
        }
        .header-actions button:hover, .header-actions a:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.15);
            transform: scale(1.02);
        }
        .header-actions .primary { background: rgba(124, 58, 237, 0.3); border-color: #8b5cf6; }
        .header-actions .primary:hover { background: rgba(124, 58, 237, 0.5); }
        .user-badge {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 40px;
            padding: 8px 20px;
            color: #8b5cf6;
            font-size: 14px;
            display: inline-block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #8b5cf6, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label { font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; }
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filters input, .filters select {
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            flex: 1;
            min-width: 150px;
        }
        .filters input:focus, .filters select:focus { border-color: #8b5cf6; }
        .filters select option { background: #1a1a2e; }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        td {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
            vertical-align: middle;
        }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }
        .badge.aes { background: rgba(34, 211, 238, 0.15); border-color: rgba(34, 211, 238, 0.2); color: #22d3ee; }
        .badge.xor { background: rgba(255, 159, 67, 0.15); border-color: rgba(255, 159, 67, 0.2); color: #ff9f43; }
        .badge.base64 { background: rgba(0, 206, 201, 0.15); border-color: rgba(0, 206, 201, 0.2); color: #00cec9; }
        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .action-btns button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px 10px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        .action-btns button:hover { background: rgba(139, 92, 246, 0.2); border-color: #8b5cf6; color: white; }
        .action-btns .delete:hover { background: rgba(255, 82, 82, 0.2); border-color: #ff5252; color: #ff5252; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        .truncate {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
        .no-user {
            text-align: center;
            padding: 60px 20px;
        }
        .no-user .icon { font-size: 64px; margin-bottom: 16px; }
        .no-user a {
            color: #8b5cf6;
            text-decoration: none;
            border: 1px solid #8b5cf6;
            padding: 12px 30px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 16px;
            transition: 0.3s;
        }
        .no-user a:hover { background: rgba(139, 92, 246, 0.15); transform: scale(1.05); }
        @media (max-width: 600px) {
            body { padding: 15px; }
            .glass { padding: 18px; }
            h1 { font-size: 24px; }
            .stats { grid-template-columns: 1fr 1fr; }
            .filters input, .filters select { min-width: 100px; }
            td { font-size: 13px; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="glass">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap;">
            <div>
                <h1>📁 Личный кабинет</h1>
                <div class="subtitle">Сохранённые шифровки и коды</div>
            </div>
            <div id="userBadgeContainer"></div>
        </div>

        <div class="header-actions">
            <a href="index.html" target="_blank" class="primary">🔗 Открыть Cat Encoder</a>
            <button onclick="exportData()">📤 Экспорт</button>
            <button onclick="document.getElementById('importInput').click()">📥 Импорт</button>
            <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
            <button onclick="clearAll()" style="border-color: rgba(255,82,82,0.3); color: #ff5252;">🗑️ Очистить всё</button>
        </div>

        <div id="contentArea">
            <!-- Содержимое будет вставлено через JS -->
        </div>
    </div>

    <script>
        // ============================================================
        //  СИСТЕМА АККАУНТОВ
        // ============================================================

        function getUsers() {
            try {
                return JSON.parse(localStorage.getItem('cyber_users')) || {};
            } catch {
                return {};
            }
        }

        function getCurrentUser() {
            return localStorage.getItem('cyber_current_user') || null;
        }

        function getUserRecords(username) {
            const users = getUsers();
            if (!users[username]) return [];
            return users[username].records || [];
        }

        function saveRecords(records) {
            const user = getCurrentUser();
            if (!user) return;
            const users = getUsers();
            if (!users[user]) {
                users[user] = { password: '', records: [] };
            }
            users[user].records = records;
            localStorage.setItem('cyber_users', JSON.stringify(users));
            // Обновляем общее хранилище
            localStorage.setItem('cyber_records', JSON.stringify(records));
        }

        function getRecords() {
            const user = getCurrentUser();
            if (!user) return [];
            return getUserRecords(user);
        }

        // ============================================================
        //  ОТОБРАЖЕНИЕ
        // ============================================================

        function renderUI() {
            const user = getCurrentUser();
            const container = document.getElementById('contentArea');
            const badgeContainer = document.getElementById('userBadgeContainer');

            if (!user) {
                badgeContainer.innerHTML = '';
                container.innerHTML = `
                    <div class="no-user">
                        <div class="icon">🔑</div>
                        <h2 style="margin-bottom: 12px; font-weight: 400;">Вы не авторизованы</h2>
                        <p style="color: rgba(255,255,255,0.4); margin-bottom: 8px;">Войдите в аккаунт, чтобы увидеть свои сохранённые записи</p>
                        <a href="index.html">🔐 Перейти к входу</a>
                    </div>
                `;
                return;
            }

            badgeContainer.innerHTML = `<span class="user-badge">👤 ${user}</span>`;

            const records = getRecords();

            container.innerHTML = `
                <div class="stats" id="stats">
                    <div class="stat-card"><div class="number" id="totalCount">${records.length}</div><div class="label">Всего записей</div></div>
                    <div class="stat-card"><div class="number" id="todayCount">${records.filter(r => new Date(r.date).toDateString() === new Date().toDateString()).length}</div><div class="label">За сегодня</div></div>
                    <div class="stat-card"><div class="number" id="methodsCount">${new Set(records.map(r => r.method)).size}</div><div class="label">Методов</div></div>
                </div>

                <div class="filters">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по тексту..." oninput="renderTable()">
                    <select id="methodFilter" onchange="renderTable()">
                        <option value="all">Все методы</option>
                        <option value="base64">Base64</option>
                        <option value="url">URL Encode</option>
                        <option value="binary">Binary</option>
                        <option value="hex">HEX</option>
                        <option value="reverse">Reverse</option>
                        <option value="xor">XOR</option>
                        <option value="aes">AES-256</option>
                    </select>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Метод</th>
                                <th>Текст</th>
                                <th>Результат</th>
                                <th style="text-align:center;">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            `;

            renderTable();
        }

        function renderTable() {
            const records = getRecords();
            const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const methodFilter = document.getElementById('methodFilter')?.value || 'all';

            let filtered = records.filter(r => {
                const matchSearch = (r.text || '').toLowerCase().includes(search) || 
                                   (r.result || '').toLowerCase().includes(search);
                const matchMethod = methodFilter === 'all' || r.method === methodFilter;
                return matchSearch && matchMethod;
            });

            filtered.sort((a, b) => b.id - a.id);

            const tbody = document.getElementById('tableBody');
            if (!tbody) return;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <div>Нет сохранённых записей</div>
                                <div style="font-size:13px; margin-top:8px;">Зашифруй что-нибудь в Cat Encoder и нажми «Сохранить в кабинет»</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(r => {
                const methodClass = { 'aes': 'aes', 'xor': 'xor', 'base64': 'base64' }[r.method] || '';
                const date = new Date(r.date);
                const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                return `
                    <tr>
                        <td style="white-space:nowrap; font-size:13px; color:rgba(255,255,255,0.5);">${dateStr}</td>
                        <td><span class="badge ${methodClass}">${r.method}</span></td>
                        <td><span class="truncate" title="${escapeHtml(r.text)}">${escapeHtml(r.text)}</span></td>
                        <td><span class="truncate" title="${escapeHtml(r.result)}">${escapeHtml(r.result)}</span></td>
                        <td style="text-align:center;">
                            <div class="action-btns">
                                <button onclick="copyText('${r.id}')" title="Копировать результат">📋</button>
                                <button onclick="deleteRecord(${r.id})" class="delete" title="Удалить">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyText(id) {
            const records = getRecords();
            const record = records.find(r => r.id === id);
            if (record && record.result) {
                navigator.clipboard.writeText(record.result).then(() => {
                    alert('✅ Скопировано!');
                }).catch(() => {
                    prompt('Скопируй вручную:', record.result);
                });
            }
        }

        function deleteRecord(id) {
            if (!confirm('Удалить запись?')) return;
            let records = getRecords();
            records = records.filter(r => r.id !== id);
            saveRecords(records);
            renderUI();
        }

        function clearAll() {
            if (!confirm('Удалить ВСЕ записи?')) return;
            saveRecords([]);
            renderUI();
        }

        // ============================================================
        //  ЭКСПОРТ / ИМПОРТ
        // ============================================================

        function exportData() {
            const records = getRecords();
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cyber_records_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        saveRecords(data);
                        renderUI();
                        alert('✅ Импорт выполнен!');
                    } else {
                        alert('❌ Неверный формат файла');
                    }
                } catch {
                    alert('❌ Ошибка чтения файла');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================

        renderUI();

        // Обновляем, если данные изменились в другом окне
        window.addEventListener('storage', function(e) {
            if (e.key === 'cyber_users' || e.key === 'cyber_current_user') {
                renderUI();
            }
        });

        console.log('✅ Личный кабинет с аккаунтами готов!');
        console.log('🔑 Данные привязаны к твоему аккаунту');
    </script>
</body>
</html>
